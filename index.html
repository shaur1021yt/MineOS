<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MineOS</title>
    <link rel="stylesheet" href="style.css">
  </head>

  <body>
    	
    <div id="welcome">
      <p id="welcomeheader">

        Welcome to MineOS!

      </p>
    <main>
      <h1>Welcome to MineOS</h1>
      <button id="welcomeclose" aria-label="Close">
        <img src="./Xsymbol_2.png" alt="Close">
      </button>
      <div class="divider">----------------------------</div>
      <h2>An Operating System for MINECRAFTERS</h2>
      <img
        src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT4OqgSOhV3WtkEQfX0edK_NtKPZ8lUZtyu-92Q-TIvb9hQ0sfclZPKwK-i_glgrS13r4b0ZGu6VxpdLq6wcyKME-Ow9ldR914G_SXc00GxGg&s=10"
        alt="Minecraft-style icon"
      />
      <br>
      <a href="https://youtube.com/@shaur1021">SUBSCRIBE Like RN</a>
    </main>
    </div>

    <div id="topbar">
      <p id="welcomeopen">

        MineOS

      </p>

      <p id="timeElement"> 
      Time
      </p>
      

    </div>

    <div id="desktopApps">
      <div class="app-icon" id="instacraftIcon">
        <img src="./download.png" alt="Instacraft icon">
        <p>Instacraft</p>
      </div>
    </div>

    




    <div id="instacraft" style="display: none;">
      <p id="instacraftHeader">Instacraft</p>
      <div class="app-content">
        <button id="instacraftClose" aria-label="Close">
          <img src="./Xsymbol_2.png" alt="Close">
        </button>
        <div class="divider">----------------------------</div>
        <div class="app-body">
          <div id="instacraftSidebar" class="app-sidebar"></div>
          <div id="instacraftContent" class="app-content-view"></div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
    

  </body>
</html>
